# Codex SDK runner configuration for the local validation workbench.

# Sandbox modes: workspace-write | read-only | danger-full-access
sandbox_mode = "workspace-write"

# Approval policies: never | on-failure | on-request | untrusted
approval_policy = "never"

# Model used by @openai/codex-sdk.
model = "gpt-5.2"

# Reasoning effort: minimal | low | medium | high | xhigh
model_reasoning_effort = "high"

[sandbox_workspace_write]
network_access = true

[features]
web_search_request = false
